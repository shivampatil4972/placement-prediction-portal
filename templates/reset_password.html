{% extends "base.html" %}

{% block title %}Reset Password - Placement Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4><i class="fas fa-shield-alt"></i> Reset Password</h4>
            </div>
            <div class="card-body p-4">
                <p class="text-muted mb-4">
                    Choose a strong password with at least 8 characters, including uppercase, lowercase, number, and special character.
                </p>

                <form method="POST" action="{{ url_for('reset_password', token=token) }}" novalidate>
                    <div class="mb-3">
                        <label for="new_password" class="form-label">New Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="new_password" name="new_password" minlength="8" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">Confirm New Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" minlength="8" required>
                        </div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-check-circle"></i> Reset Password
                        </button>
                    </div>
                </form>

                <hr class="my-4">
                <p class="text-center mb-0">
                    <a href="{{ url_for('login') }}">Back to login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
